// NOTE:
// This is an internal proto definition and should not be
// used in any public interface.
// Stability and backwards compatibility is not guaranteed.

syntax = "proto3";
package ansys.api.acp.internal.graphics;

// The package name 'internal' has special meaning in Go:
// other modules cannot import it.
// To avoid this, we use 'unstable' instead of 'internal'.
// This only affects the generated Go code.
option go_package = "github.com/ansys/ansys-api-acp/ansys/api/acp/unstable/graphics";

import "ansys/api/acp/v0/base.proto";
import "ansys/api/acp/v0/mesh_query.proto";
import "ansys/web/graphics.proto";

message GetMeshGraphicsRequest {
    v0.base.ResourcePath resource_path = 1;
    v0.mesh_query.ElementScopingType element_scoping = 2;
}

message GetElementalDataRequest {
    v0.base.ResourcePath resource_path = 1;
    v0.mesh_query.ElementalDataType data_type = 2;
    v0.mesh_query.ElementScopingType element_scoping = 3;
}

message GetElementalDataReply { ansys.web.graphics.Array result_array = 1; }

service GraphicsService {
    rpc GetMeshGraphics(GetMeshGraphicsRequest)
        returns (ansys.web.graphics.BodyGraphics);

    rpc GetElementalData(GetElementalDataRequest)
        returns (GetElementalDataReply);
}
