// NOTE:
// This is an internal proto definition and should not be
// used in any public interface.
// Stability and backwards compatibility is not guaranteed.

syntax = "proto3";
package ansys.api.acp.internal.event;

// The package name 'internal' has special meaning in Go:
// other modules cannot import it.
// To avoid this, we use 'unstable' instead of 'internal'.
// This only affects the generated Go code.
option go_package = "github.com/ansys/ansys-api-acp/ansys/api/acp/unstable/event";

import "ansys/api/acp/v0/base.proto";
import "ansys/api/acp/v0/enum_types.proto";

enum EventType {
    INIT = 0; // signals the start of the stream
    CREATE = 1;
    PUT = 2;
    DELETE = 3;
    // Alias events represent re-parented entries, for example analysis plies
    // under SolidModel, ImportedSolidModel, or LayupMappingObject parents.
    CREATE_ALIAS = 4;
    DELETE_ALIAS = 5;
    INITIAL_STATE_END = 6; // signals the end of the initial state events
}

message StatusProperties {
    optional v0.enum_types.StatusType status = 1;
    optional bool locked = 2;
}

message CreateEventData {
    v0.base.BasicInfo info = 1;
    StatusProperties properties = 2;
}
message PutEventData {
    v0.base.BasicInfo info = 1;
    StatusProperties properties = 2;
}
message DeleteEventData { string uuid = 1; }

message CreateAliasEventData {
    v0.base.ResourcePath canonical_resource_path = 1;
    v0.base.ResourcePath leaf_resource_path = 2;
}
message DeleteAliasEventData { v0.base.ResourcePath leaf_resource_path = 1; }

message EventStreamRequest {
    // When true, all objects currently present in the model are emitted
    // as CREATE or CREATE_ALIAS events at the start of the stream.
    bool include_initial_state = 1;
}

message Event {
    EventType type = 1;
    oneof data {
        CreateEventData create = 2;
        PutEventData put = 3;
        DeleteEventData delete = 4;
        CreateAliasEventData create_alias = 5;
        DeleteAliasEventData delete_alias = 6;
    };
}

service EventService {
    rpc EventStream(EventStreamRequest) returns (stream Event);
}
